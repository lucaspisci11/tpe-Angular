<div class="quantity-controls">

  <button
    class="qty-btn"
    (click)="downQuantity()"
    [disabled]="quantity === 0">
    -
  </button>

  <span class="quantity-value">
    {{ quantity }}
  </span>

  <button
    class="qty-btn"
    (click)="upQuantity()"
    [disabled]="max === 0 || quantity >= max">
    +
  </button>

</div>
